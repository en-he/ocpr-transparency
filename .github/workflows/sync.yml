name: Contract Sync

on:
  schedule:
    # Weekly official bulk-CSV refresh — Sunday 3 AM AST (7 AM UTC)
    - cron: '0 7 * * 0'
    # Monthly audit rebuild — 2nd day of month 4 AM AST (8 AM UTC)
    - cron: '0 8 2 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Sync mode'
        required: true
        default: 'weekly'
        type: choice
        options:
          - weekly
          - monthly-audit
          - full-rebuild

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FULL_DB_RELEASE_TAG: data-latest
      FULL_DB_RELEASE_ASSET: contratos-full.db.gz

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Hydrate full DB from release asset when needed
        id: hydrate
        if: github.event.inputs.mode != 'full-rebuild'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data/db

          if [ -f data/db/contratos.db ]; then
            echo "bootstrap=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ -f data/db/contratos-full.db.gz ]; then
            gzip -dc data/db/contratos-full.db.gz > data/db/contratos.db
            echo "bootstrap=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if gh release download "$FULL_DB_RELEASE_TAG" \
            --pattern "$FULL_DB_RELEASE_ASSET" \
            --dir data/db; then
            gzip -dc "data/db/$FULL_DB_RELEASE_ASSET" > data/db/contratos.db
            echo "bootstrap=false" >> $GITHUB_OUTPUT
          else
            echo "bootstrap=true" >> $GITHUB_OUTPUT
          fi

      - name: Bootstrap full DB from archived CSVs
        if: steps.hydrate.outputs.bootstrap == 'true'
        working-directory: pipeline
        run: python ingest.py --reset

      - name: Record full DB hash before sync
        id: db_before
        run: |
          if [ -f data/db/contratos.db ]; then
            echo "hash=$(sha256sum data/db/contratos.db | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          else
            echo "hash=missing" >> $GITHUB_OUTPUT
          fi

      - name: Determine sync mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 7 * * 0" ]; then
            echo "mode=weekly" >> $GITHUB_OUTPUT
          else
            echo "mode=monthly-audit" >> $GITHUB_OUTPUT
          fi

      - name: Compute sync stamp
        id: stamp
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      # ── Weekly — refresh newer official bulk CSV years ───────────────
      - name: Weekly — refresh newer official bulk CSV years
        if: steps.mode.outputs.mode == 'weekly'
        working-directory: pipeline
        run: python download.py --refresh-live --force

      - name: Weekly — detect raw CSV changes
        id: weekly_raw_changes
        if: steps.mode.outputs.mode == 'weekly'
        run: |
          if [ -n "$(git status --porcelain -- data/raw)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Weekly — reset and re-ingest tracked sources
        if: steps.mode.outputs.mode == 'weekly' && steps.weekly_raw_changes.outputs.changed == 'true'
        working-directory: pipeline
        run: python ingest.py --reset

      # ── Monthly audit rebuild ────────────────────────────────────────
      - name: Monthly audit — reset and ingest tracked sources
        if: steps.mode.outputs.mode == 'monthly-audit'
        working-directory: pipeline
        run: python ingest.py --reset

      # ── Full rebuild (manual) ────────────────────────────────────────
      - name: Full rebuild — download all years
        if: steps.mode.outputs.mode == 'full-rebuild'
        working-directory: pipeline
        run: python download.py --force

      - name: Full rebuild — reset and ingest
        if: steps.mode.outputs.mode == 'full-rebuild'
        working-directory: pipeline
        run: python ingest.py --reset

      - name: Detect whether browser artifacts need rebuild
        id: artifacts
        run: |
          if [ -f data/db/contratos.db ]; then
            after_hash=$(sha256sum data/db/contratos.db | cut -d' ' -f1)
          else
            after_hash=missing
          fi
          echo "after_hash=$after_hash" >> $GITHUB_OUTPUT

          if [ "${{ steps.mode.outputs.mode }}" = "monthly-audit" ]; then
            echo "rebuild=true" >> $GITHUB_OUTPUT
          elif [ "${{ steps.mode.outputs.mode }}" = "full-rebuild" ]; then
            echo "rebuild=true" >> $GITHUB_OUTPUT
          elif [ "${{ steps.hydrate.outputs.bootstrap }}" = "true" ]; then
            echo "rebuild=true" >> $GITHUB_OUTPUT
          elif [ ! -f site/data-manifest.json ]; then
            echo "rebuild=true" >> $GITHUB_OUTPUT
          elif [ "${{ steps.db_before.outputs.hash }}" = "$after_hash" ]; then
            echo "rebuild=false" >> $GITHUB_OUTPUT
          else
            echo "rebuild=true" >> $GITHUB_OUTPUT
          fi

      # ── Build site assets ────────────────────────────────────────────
      - name: Build browser DB + manifest
        if: steps.artifacts.outputs.rebuild == 'true'
        run: >
          python pipeline/build_site_artifacts.py
          --repo-raw-base https://github.com/${{ github.repository }}/raw/main
          --full-download-url https://github.com/${{ github.repository }}/releases/download/${{ env.FULL_DB_RELEASE_TAG }}/${{ env.FULL_DB_RELEASE_ASSET }}

      - name: Publish full DB release asset
        if: steps.artifacts.outputs.rebuild == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$FULL_DB_RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$FULL_DB_RELEASE_TAG" \
              --title "Latest data" \
              --notes "Automated full SQLite database for OCPR Transparency."

          gh release upload "$FULL_DB_RELEASE_TAG" "data/db/$FULL_DB_RELEASE_ASSET" --clobber
          gh release edit "$FULL_DB_RELEASE_TAG" --draft=false

      # ── Commit changes ───────────────────────────────────────────────
      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: ${{ steps.mode.outputs.mode }} sync ${{ steps.stamp.outputs.date }}"
          file_pattern: "data/raw/ data/db/monitor_state.json site/contratos.db.gz* site/data-manifest.json"
