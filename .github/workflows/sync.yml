name: Contract Sync

on:
  schedule:
    # Nightly delta sync — 2 AM AST (6 AM UTC)
    - cron: '0 6 * * *'
    # Weekly current-year rebuild — Sunday 3 AM AST (7 AM UTC)
    - cron: '0 7 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Sync mode'
        required: true
        default: 'delta'
        type: choice
        options:
          - delta
          - weekly
          - full-rebuild

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Determine sync mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "$(date +%u)" = "7" ] && [ "${{ github.event.schedule }}" = "0 7 * * 0" ]; then
            echo "mode=weekly" >> $GITHUB_OUTPUT
          else
            echo "mode=delta" >> $GITHUB_OUTPUT
          fi

      # ── Delta sync (nightly) ─────────────────────────────────────────
      - name: Delta sync — fetch new contracts
        if: steps.mode.outputs.mode == 'delta'
        working-directory: pipeline
        run: python monitor.py

      # ── Weekly — re-download current fiscal years ────────────────────
      - name: Weekly — download current fiscal years
        if: steps.mode.outputs.mode == 'weekly'
        working-directory: pipeline
        run: python download.py --years 2023-2024 2022-2023 --force

      - name: Weekly — re-ingest
        if: steps.mode.outputs.mode == 'weekly'
        working-directory: pipeline
        run: python ingest.py

      # ── Full rebuild (manual) ────────────────────────────────────────
      - name: Full rebuild — download all years
        if: steps.mode.outputs.mode == 'full-rebuild'
        working-directory: pipeline
        run: python download.py --force

      - name: Full rebuild — reset and ingest
        if: steps.mode.outputs.mode == 'full-rebuild'
        working-directory: pipeline
        run: python ingest.py --reset

      # ── Build site assets ────────────────────────────────────────────
      - name: Compress database for site
        run: gzip -kf data/db/contratos.db && mv data/db/contratos.db.gz site/

      # ── Commit changes ───────────────────────────────────────────────
      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: ${{ steps.mode.outputs.mode }} sync $(date -u +%Y-%m-%d)"
          file_pattern: "data/ site/contratos.db.gz"
